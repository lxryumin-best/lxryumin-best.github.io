<div class="custom-gallery" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin: 2rem 0;">
  {{ range .Page.Resources.ByType "image" }}
    <a href="{{ .RelPermalink }}" target="_blank">
      <img src="{{ .RelPermalink }}" alt="{{ .Name }}" style="width: 100%; height: 250px; object-fit: cover; border-radius: 8px; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    </a>
  {{ end }}
</div>
