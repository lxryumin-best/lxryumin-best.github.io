{{- /* Watermark logo on all pages */ -}}
<style>
  /* === LOGO WATERMARK === */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('/Logo.png');
    background-size: 280px auto;
    background-repeat: repeat;
    transform: rotate(-25deg) scale(1.5);
    transform-origin: center center;
    opacity: 0.06;
    pointer-events: none;
    z-index: 0;
  }

  /* Make sure content stays above watermark */
  #content, .main, header, footer, .post-content, .profile, nav {
    position: relative;
    z-index: 1;
  }

  /* === CONTACT FOOTER BUTTON === */
  .contact-footer-bar {
    text-align: center;
    padding: 1.2rem 1rem;
    margin-top: 2rem;
    border-top: 1px solid var(--border, rgba(128,128,128,0.2));
  }

  .contact-footer-bar a.contact-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.6rem;
    border-radius: 6px;
    background: var(--theme, #1d1e20);
    border: 1px solid var(--border, rgba(128,128,128,0.3));
    color: var(--primary, inherit);
    font-size: 0.95rem;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.2s, opacity 0.2s;
    cursor: pointer;
  }

  .contact-footer-bar a.contact-btn:hover {
    opacity: 0.8;
  }

  .contact-footer-bar .contact-email {
    display: block;
    margin-top: 0.5rem;
    font-size: 0.85rem;
    opacity: 0.6;
    font-family: monospace;
  }
</style>
